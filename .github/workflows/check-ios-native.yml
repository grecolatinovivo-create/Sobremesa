name: Check iOS nativa (build di prova)

on:
  workflow_dispatch:
  push:
    paths:
      - "native-ios/**"
      - ".github/workflows/check-ios-native.yml"

# I runner macOS scalano ×10: se arriva un push mentre un check è in corsa,
# il run vecchio viene ANNULLATO — si paga solo l'ultimo.
concurrency:
  group: check-ios-native
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Installa XcodeGen
        run: brew install xcodegen

      - name: Genera il progetto Xcode
        working-directory: native-ios
        run: xcodegen generate

      # L'esito viene SOLO dal codice di uscita di xcodebuild: il log va su
      # file e si filtra DOPO. Niente pipe vive (grep/head a valle + bash -e
      # trasformano un broken pipe in un finto fallimento), e il rumore
      # "CoreData: error:" di SwiftData al primo avvio è escluso dal riepilogo.
      - name: Compila (simulatore, nessuna firma)
        working-directory: native-ios
        run: |
          set +e
          xcodebuild -project Sobremesa.xcodeproj \
            -scheme Sobremesa \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build > /tmp/xcode-build.log 2>&1
          BUILD_EXIT=$?
          grep -E "BUILD (FAILED|SUCCEEDED)" /tmp/xcode-build.log || true
          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo ""
            echo "════ ERRORI DI COMPILAZIONE ════"
            grep -E "(^|[[:space:]])error:" /tmp/xcode-build.log \
              | grep -v "CoreData: error:" | head -60 || true
          fi
          exit "$BUILD_EXIT"

      # L'engine ha 12 unit test: girano sul simulatore, sempre senza firma.
      - name: Unit test (SobremesaTests)
        working-directory: native-ios
        run: |
          set +e
          xcodebuild -project Sobremesa.xcodeproj \
            -scheme Sobremesa \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            test > /tmp/xcode-test.log 2>&1
          TEST_EXIT=$?
          echo "── Riepilogo test ──"
          grep -E "Test Suite|Executed [0-9]+ tests|TEST (FAILED|SUCCEEDED)" /tmp/xcode-test.log | tail -25 || true
          if [ "$TEST_EXIT" -ne 0 ]; then
            echo ""
            echo "════ ERRORI DEI TEST ════"
            grep -E "(^|[[:space:]])(error:|failed)" /tmp/xcode-test.log \
              | grep -v "CoreData: error:" | head -60 || true
          fi
          exit "$TEST_EXIT"
