# Sobremesa — definizione del progetto Xcode (XcodeGen).
# Il .xcodeproj NON è versionato: si rigenera con `xcodegen generate`
# (in CI avviene da solo). Questo file è la sorgente di verità del progetto.

name: Sobremesa

options:
  developmentLanguage: it
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG

targets:

  Sobremesa:
    type: application
    platform: iOS
    sources:
      - path: Sobremesa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.giampieromarchi.sobremesa
        # Versione commerciale: si alza A MANO quando cambia la sostanza.
        MARKETING_VERSION: "1.0"
        # Build number: in release viene SOVRASCRITTO da github.run_number.
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Config/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
        STRING_CATALOG_GENERATE_SYMBOLS: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"

  SobremesaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SobremesaTests
    dependencies:
      - target: Sobremesa
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: it.giampieromarchi.sobremesa.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Sobremesa.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Sobremesa
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  Sobremesa:
    build:
      targets:
        Sobremesa: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - SobremesaTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
